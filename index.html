<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ammar Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Ammar Weather App</h1>

<div class="search-box">
  <input type="text" id="city" placeholder="Search for a city">
  <button onclick="getWeather()">SUBMIT</button>
</div>

<div class="cards">

  <div class="card">
    <div class="city">Gujrat <span class="tag">FR</span></div>
    <div class="temp">9°C</div>
    
    <div class="desc">LIGHT INTENSITY DRIZZLE</div>
  </div>

  <div class="card">
    <div class="city">Sialkot <span class="tag">AU</span></div>
    <div class="temp">15°C</div>
    
    <div class="desc">CLEAR SKY</div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>

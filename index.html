<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ammar Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Ammar Weather App</h1>

        <div class="search-box">
            <input type="text" placeholder="Search city">
            <button>Search</button>
        </div>

        <div class="cards">

            <div class="card">
                <div class="top">
                    <h2>Gujrat</h2>
                    <span>🌧️</span>
                </div>

                <h3>9°C</h3>

                <p>Light Intensity Drizzle</p>
            </div>

            <div class="card">
                <div class="top">
                    <h2>Sialkot</h2>
                    <span>☀️</span>
                </div>

                <h3>15°C</h3>

                <p>Clear Sky</p>
            </div>

            <div class="card">
                <div class="top">
                    <h2>Lahore</h2>
                    <span>⛅</span>
                </div>

                <h3>22°C</h3>

                <p>Few Clouds</p>
            </div>

        </div>

    </div>

</body>
</html>
